name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend ───────────────────────────────────────────────────
  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:latest-pg15
        env:
          POSTGRES_DB: nexusreport_test
          POSTGRES_USER: nexus
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://nexus:testpass@localhost/nexusreport_test
          REDIS_URL: redis://localhost:6379
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          cd backend
          pytest tests/ -v --tb=short

  # ─── Frontend ──────────────────────────────────────────────────
  frontend-build:
    name: Frontend build + type-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install & build
        run: |
          cd frontend
          npm ci
          npm run type-check
          npm run build

  # ─── SDK packages ──────────────────────────────────────────────
  sdk-build:
    name: SDK adapter packages
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Playwright reporter
        run: |
          cd adapters-sdk/playwright-reporter
          npm ci
          npm run build

      - name: Build Cypress plugin
        run: |
          cd adapters-sdk/cypress-plugin
          npm ci
          npm run build

      - name: Build Jest reporter
        run: |
          cd adapters-sdk/jest-reporter
          npm ci
          npm run build

  # ─── Docker build ──────────────────────────────────────────────
  docker:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build ./backend -t nexusreport-backend:ci

      - name: Build frontend image
        run: docker build ./frontend -t nexusreport-frontend:ci
